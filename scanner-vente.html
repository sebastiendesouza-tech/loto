<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Scanner vente</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="css/app.css"></head><body class="sale-scanner-body">
<header class="sale-scanner-header"><div><b>Scanner vente</b><span id="scannerLotoName">Chargement…</span></div></header>
<main class="sale-scanner-main" id="saleScannerScreen"><div class="sale-mode-switch"><button id="modeSale" class="active">MODE VENTE</button><button id="modeReturn">MODE RETOUR</button></div>
<div id="scannerStatus" class="sale-scanner-message">Appuyez sur « Démarrer la caméra ».</div>
<div class="sale-phone-camera" id="saleCameraBox"><video id="saleVideo" playsinline autoplay muted></video><div class="sale-phone-frame"></div></div>
<button id="startSaleCamera" class="sale-camera-start">Démarrer la caméra</button>
<p class="sale-phone-help">Présentez le QR code du carton dans le cadre. Le scanner reste dans le mode sélectionné.</p></main>
<script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script><script src="js/scanner-vente-page.js"></script></body></html>
