<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Animateur</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="css/app.css"></head><body class="animateur-body">
<header class="topbar"><div><span class="brand" data-title></span><span class="version" data-version></span></div><div class="session">Session <span data-session></span></div></header>
<main class="wrap"><div class="card one-line"><button id="newGame" class="red">Nouvelle partie</button><button id="winner" class="green">Gagnant</button><button id="nextPrize">Lot suivant</button><button id="undo" class="secondary">Annuler dernier</button><button id="commit">Valider attente</button><button id="cancelPending" class="secondary">Erreur</button><span>Dernier : <b id="last">--</b></span><span>Sortis : <b id="count">0</b></span><a class="btn light" href="index.html">Menu</a></div><div id="currentLot" class="card current-lot compact-lot"></div><div class="card numbers-card"><div id="grid" class="numbers animateur-numbers"></div></div><div class="card history-card"><h3>Historique</h3><div id="history" class="history"></div></div></main>
<script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script src="js/animateur-page.js"></script></body></html>
