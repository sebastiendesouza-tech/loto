<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Animateur</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="css/app.css"></head><body class="animateur-body">
<header class="topbar"><div><span class="brand" data-title></span><span class="version" data-version></span></div><div class="session"><span data-loto-name>LOTO SDS</span></div></header>
<main class="wrap animateur-wrap-v229">
  <div class="card one-line animateur-commandbar">
    <button id="launchLoto" class="green">Lancer loto</button>
    <button id="newGame" class="secondary">Partie simple</button>
    <button id="winner" class="green">Gagnant</button>
    <button id="startMiniBingo" class="orange" style="display:none">Lancer Mini-bingo</button>
    <button id="undo" class="secondary">Annuler dernier</button>
    <button id="cancelPending" class="secondary">Erreur</button>
    <span>Sortis : <b id="count">0</b></span>
    <a class="btn light" href="index.html">Menu</a>
  </div>
  <div class="animateur-main-v229">
    <section class="card numbers-card animateur-grid-panel">
      <div id="grid" class="numbers animateur-numbers"></div>
    </section>
    <aside class="animateur-side-v229">
      <div class="card animateur-last-card">
        <div class="side-label">Dernier numéro</div>
        <div id="last" class="animateur-last-number">--</div>
      </div>
      <div id="currentLot" class="card current-lot compact-lot"></div>
      <div class="card animateur-control-card">
        <h3>Contrôle carton</h3>
        <div class="toolbar control-toolbar-v229">
          <input id="animCardNumber" type="number" placeholder="N° carton">
          <button id="animCheckBtn">Contrôler</button>
          <button id="animHidePublic" class="secondary">Fermer</button>
        </div>
        <div id="animCardResult" class="result-box compact-result"></div>
      </div>
    </aside>
  </div>
  <div class="card history-card"><h3>Historique</h3><div id="history" class="history"></div></div>
</main><div id="launchModal" class="modal-soft" style="display:none"><div class="modal-panel"><h2>Lancer un loto</h2><p>Choisis un loto enregistré ou démarre une partie simple.</p><div id="launchList"></div><p class="toolbar"><button id="closeLaunch" class="secondary">Fermer</button><button id="modalBlankGame">Nouvelle partie simple</button></p></div></div>
<script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script src="js/animateur-page.js"></script></body></html>
