<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commissaire</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="css/app.css"></head><body>
<header class="topbar"><div><span class="brand" data-title></span><span class="version" data-version></span></div><div class="session">Commissaire</div></header>
<main class="wrap two-cols"><section class="card"><h3>Suivi tirage</h3><div id="grid" class="numbers"></div></section><section class="card"><div>Dernier numéro</div><div id="last" class="big-last">--</div><div id="currentLot" class="current-lot compact-lot" style="margin:10px 0"></div><h3>Correction tirage</h3><div class="toolbar correction-toolbar"><button id="commUndo" class="secondary">Annuler dernier numéro</button><input id="commCancelNumber" type="number" min="1" max="90" placeholder="N° à annuler"><button id="commCancelBtn" class="secondary">Annuler ce numéro</button></div><div class="toolbar correction-toolbar"><input id="commOldNumber" type="number" min="1" max="90" placeholder="Mauvais n°"><input id="commNewNumber" type="number" min="1" max="90" placeholder="Bon n°"><button id="commReplaceBtn">Remplacer</button></div><p id="commCorrectionMsg" class="muted"></p><h3>Contrôle carton</h3><div class="toolbar"><input id="cardNumber" type="number" inputmode="numeric" placeholder="N° carton"><button id="checkBtn">Contrôler</button></div><div class="toolbar no-print"><a class="btn green" id="openCommissaireScan" href="scan.html?mode=commissaire">Scanner un carton</a></div><div id="result" class="result" style="margin-top:12px"></div><div class="toolbar"><button id="showPublic" style="display:none">Afficher au public</button><button id="hidePublic" class="secondary">Fermer affichage</button></div></section></main>
<script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script src="js/commissaire-page.js"></script><script>
(function(){
  const a=document.getElementById('openCommissaireScan');
  if(a) a.href=new URL('scan.html?mode=commissaire', location.href).href;
})();
</script></body></html>
