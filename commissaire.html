<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commissaire</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="css/app.css"></head><body>
<header class="topbar"><div><span class="brand" data-title></span><span class="version" data-version></span></div><div class="session">Commissaire</div></header>
<main class="wrap two-cols"><section class="card"><h3>Suivi tirage</h3><div id="grid" class="numbers"></div></section><section class="card"><div>Dernier numéro</div><div id="last" class="big-last">--</div><div id="currentLot" class="current-lot compact-lot" style="margin:10px 0"></div><h3>Correction tirage</h3><div class="toolbar correction-toolbar"><button id="commUndo" class="secondary">Annuler dernier numéro</button><input id="commCancelNumber" type="number" min="1" max="90" placeholder="N° à annuler"><button id="commCancelBtn" class="secondary">Annuler ce numéro</button></div><div class="toolbar correction-toolbar"><input id="commOldNumber" type="number" min="1" max="90" placeholder="Mauvais n°"><input id="commNewNumber" type="number" min="1" max="90" placeholder="Bon n°"><button id="commReplaceBtn">Remplacer</button></div><p id="commCorrectionMsg" class="muted"></p><h3>Contrôle carton</h3><div class="toolbar"><input id="cardNumber" type="number" inputmode="numeric" placeholder="N° carton"><button id="checkBtn">Contrôler</button></div><div class="card soft no-print scan-admin-qr"><h4>Scanner commissaire téléphone</h4><div id="scanCommissaireQr"></div><p class="muted"><span id="scanCommissaireUrlText"></span></p></div><div id="result" class="result" style="margin-top:12px"></div><div class="toolbar"><button id="showPublic" style="display:none">Afficher au public</button><button id="hidePublic" class="secondary">Fermer affichage</button></div></section></main>
<script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script><script src="js/commissaire-page.js"></script><script>
(function(){
  const url=new URL('scan.html?mode=commissaire', location.href).href;
  const txt=document.getElementById('scanCommissaireUrlText'); if(txt) txt.textContent=url;
  const box=document.getElementById('scanCommissaireQr');
  if(box){
    try{ if(window.QRCode){ new QRCode(box,{text:url,width:170,height:170,correctLevel:QRCode.CorrectLevel.M}); return; } }catch(e){}
    const img=document.createElement('img'); img.alt='QR code scanner commissaire'; img.width=170; img.height=170; img.src='https://api.qrserver.com/v1/create-qr-code/?size=170x170&data='+encodeURIComponent(url); box.appendChild(img);
  }
})();
</script></body></html>
