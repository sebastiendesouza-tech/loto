<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Administration</title><link rel="stylesheet" href="css/app.css"></head><body>
<header class="topbar"><div><span class="brand" data-title></span><span class="version" data-version></span></div><a class="btn small light" href="index.html">Menu</a></header>
<main class="wrap"><div class="card"><h1>Administration</h1><div class="admin-tabs no-print"><button data-tab="general">Général</button><button data-tab="parties">Parties / lots</button><button data-tab="bingo">Bingo</button><button data-tab="cartons">Cartons</button><button data-tab="about">À propos</button></div>
<section id="general" class="tab active"><h2>Général</h2><label>Nom affiché<input id="lotoName"></label><label>Nombre de secondes avant validation automatique<input id="prevalidate" type="number" min="1" max="30"></label><p><button id="saveGeneral">Enregistrer</button></p></section>
<section id="parties" class="tab"><h2>Parties / lots</h2><label><input id="showLots" type="checkbox" style="width:auto"> Afficher les lots côté public</label><div id="partiesList"></div><p class="toolbar"><button id="addPartie">Ajouter une partie</button><button id="saveProgram">Enregistrer programme</button></p></section>
<section id="bingo" class="tab"><h2>Bingo</h2><label><input id="bingoEnabled" type="checkbox" style="width:auto"> Activer le mode Bingo</label><label><input id="showBingo" type="checkbox" style="width:auto"> Afficher le Bingo au public</label><p><button id="saveBingo">Enregistrer</button></p></section>
<section id="cartons" class="tab"><h2>Cartons</h2><p>Table prévue : <b>loto_cartons</b>. Import complet dans l'étape suivante.</p><div class="toolbar"><input id="testCard" type="number" placeholder="Tester un numéro de carton"><button id="testCardBtn">Rechercher</button></div><pre id="testCardResult"></pre></section>
<section id="about" class="tab"><h2>À propos</h2><p><b>Version :</b> <span data-version></span></p><p><b>Session :</b> <span data-session></span></p><p><b>Supabase :</b> connecté si la configuration est correcte.</p></section>
</div></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script src="js/admin-page.js"></script></body></html>
