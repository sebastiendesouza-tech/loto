<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Loto - Comité des Fêtes</title><link rel="stylesheet" href="css/style.css"></head><body data-page="home"><main class="home"><h1>LOTO<span>Comité des Fêtes</span></h1><section class="panel"><label for="sessionCode">Code session</label><input id="sessionCode" autocomplete="off" placeholder="ex : LOTO2026"><div class="row"><button id="joinBtn">Créer / rejoindre</button><button id="randomBtn" class="secondary">Code automatique</button></div><p class="muted">Utilise le même code sur le PC, l'animateur et le commissaire.</p></section><section id="roles" class="roles hidden"><a id="publicLink">Affichage public</a><a id="animateurLink">Animateur</a><a id="commissaireLink">Commissaire</a></section></main><script>const input=document.getElementById('sessionCode');input.value=localStorage.getItem('lotoCode')||'';function clean(v){return String(v||'').trim().toUpperCase().replace(/[^A-Z0-9-]/g,'').slice(0,24)}function roles(){const c=clean(input.value);if(!c){input.focus();return}localStorage.setItem('lotoCode',c);document.getElementById('roles').classList.remove('hidden');document.getElementById('publicLink').href='public.html?s='+encodeURIComponent(c);document.getElementById('animateurLink').href='animateur.html?s='+encodeURIComponent(c);document.getElementById('commissaireLink').href='commissaire.html?s='+encodeURIComponent(c)}document.getElementById('joinBtn').onclick=roles;document.getElementById('randomBtn').onclick=()=>{input.value='LOTO-'+Math.random().toString(36).slice(2,7).toUpperCase();roles()};input.addEventListener('keydown',e=>{if(e.key==='Enter')roles()});if(input.value)roles();</script></body></html>
