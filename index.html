<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Loto - Comité des Fêtes</title><link rel="stylesheet" href="css/style.css"></head><body data-page="home"><main class="home" id="homeApp" style="display:none"><h1>LOTO<span>Comité des Fêtes</span></h1><section class="panel"><label for="sessionCode">Code session</label><input id="sessionCode" autocomplete="off" placeholder="ex : LOTO2026"><div class="row"><button id="joinBtn">Créer / rejoindre</button><button id="randomBtn" class="secondary">Code automatique</button></div><p class="muted">Utilise le même code sur le PC, l'animateur et le commissaire.</p></section><section id="roles" class="roles hidden"><a id="publicLink">Affichage public</a><a id="animateurLink">Animateur</a><a id="commissaireLink">Commissaire</a><a id="impressionsLink">Impressions PDF</a><button id="logoutBtn" class="secondary" type="button">Déconnexion équipe</button></section></main><script src="config.js"></script><script>const cfg=window.LOTO_CONFIG||{};const pin=String(cfg.TEAM_PIN||'2580');function showHome(){document.getElementById('homeApp').style.display='block'}function askPin(){if(localStorage.getItem('lotoTeamPinOk')===pin){showHome();return}document.body.innerHTML='<div class="pin-lock"><div class="pin-box"><h1>LOTO SDS</h1><p>Acces equipe</p><input id="pinInput" type="password" inputmode="numeric" autocomplete="off" placeholder="Code PIN"><button id="pinBtn">Entrer</button><div id="pinError" class="pin-error"></div></div></div>';const i=document.getElementById('pinInput'),b=document.getElementById('pinBtn'),e=document.getElementById('pinError');const submit=()=>{if(i.value.trim()===pin){localStorage.setItem('lotoTeamPinOk',pin);location.reload()}else{e.textContent='Code PIN incorrect';i.value='';i.focus()}};b.onclick=submit;i.addEventListener('keydown',ev=>{if(ev.key==='Enter')submit()});i.focus()}askPin();</script><script>const input=document.getElementById('sessionCode');if(input){input.value=localStorage.getItem('lotoCode')||'';function clean(v){return String(v||'').trim().toUpperCase().replace(/[^A-Z0-9-]/g,'').slice(0,24)}function roles(){const c=clean(input.value);if(!c){input.focus();return}localStorage.setItem('lotoCode',c);document.getElementById('roles').classList.remove('hidden');document.getElementById('publicLink').href='public.html?s='+encodeURIComponent(c);document.getElementById('animateurLink').href='animateur.html?s='+encodeURIComponent(c);document.getElementById('commissaireLink').href='commissaire.html?s='+encodeURIComponent(c);document.getElementById('impressionsLink').href='impressions.html?s='+encodeURIComponent(c);document.getElementById('logoutBtn').onclick=()=>{localStorage.removeItem('lotoTeamPinOk');location.reload()}}document.getElementById('joinBtn').onclick=roles;document.getElementById('randomBtn').onclick=()=>{input.value='LOTO-'+Math.random().toString(36).slice(2,7).toUpperCase();roles()};input.addEventListener('keydown',e=>{if(e.key==='Enter')roles()});if(input.value)roles();}</script></body></html>
