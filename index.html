<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loto Comité des Fêtes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-role="home">
  <main class="home">
    <h1>LOTO<br><span>Comité des Fêtes</span></h1>
    <section class="panel">
      <label>Code session</label>
      <input id="sessionCode" placeholder="ex : LOTO2026" autocomplete="off">
      <div class="home-actions">
        <button id="createBtn">Créer / rejoindre</button>
        <button id="randomBtn">Code automatique</button>
      </div>
      <p class="hint">Tous les appareils doivent utiliser le même code session.</p>
    </section>
    <section class="role-grid hidden" id="roleGrid">
      <a id="publicLink" class="role-card" href="#">Affichage public</a>
      <a id="animateurLink" class="role-card" href="#">Animateur</a>
      <a id="commissaireLink" class="role-card" href="#">Commissaire</a>
    </section>
  </main>
  <script>
    const input = document.getElementById('sessionCode');
    const saved = localStorage.getItem('lotoSessionCode') || '';
    input.value = saved;
    function clean(v){ return String(v || '').trim().toUpperCase().replace(/[^A-Z0-9-]/g,'').slice(0,24); }
    function showRoles(){
      const code = clean(input.value);
      if(!code){ input.focus(); return; }
      localStorage.setItem('lotoSessionCode', code);
      document.getElementById('roleGrid').classList.remove('hidden');
      document.getElementById('publicLink').href = 'public.html?s=' + encodeURIComponent(code);
      document.getElementById('animateurLink').href = 'animateur.html?s=' + encodeURIComponent(code);
      document.getElementById('commissaireLink').href = 'commissaire.html?s=' + encodeURIComponent(code);
    }
    document.getElementById('createBtn').onclick = showRoles;
    document.getElementById('randomBtn').onclick = () => { input.value = 'LOTO-' + Math.random().toString(36).slice(2,7).toUpperCase(); showRoles(); };
    input.addEventListener('keydown', e => { if(e.key === 'Enter') showRoles(); });
    if(saved) showRoles();
  </script>
</body>
</html>
