<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Loto by SdS</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/apple-touch-icon.png"><link rel="stylesheet" href="css/app.css"></head><body>
<header class="topbar"><div><span class="brand" data-title></span><span class="version" data-version></span></div><div class="session">Session <span data-session></span></div></header>
<main class="wrap"><div class="card"><h1>Accueil équipe</h1><div class="grid-links">
<a class="role" href="public.html">🎥 Affichage public</a><a class="role" href="animateur.html">🎤 Animateur</a><a class="role" href="commissaire.html">✅ Commissaire</a><a class="role" href="vente.html">💶 Suivi des ventes</a><a class="role" href="administration.html">⚙️ Administration</a><a class="role" href="impressions.html">🖨️ Impressions PDF</a><a class="role" href="joueur.html">📱 Page joueur</a>
</div><p class="footer-note">Les pages équipe sont protégées par PIN. La page joueur reste libre.</p></div></main><div id="homeCardOverlay" style="display:none;position:fixed;inset:5%;z-index:50;background:#fff;color:#111;border-radius:22px;padding:24px;box-shadow:0 0 0 999px rgba(0,0,0,.65)"></div>
<script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/core.js"></script><script>Loto.pageHeader();Loto.protectPage();function p2(n){return String(n).padStart(2,'0')}function eh(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c))}function renderHomeCard(card){const o=document.getElementById('homeCardOverlay');if(!o)return;if(!card){o.style.display='none';return}o.style.display='block';const msg=(card.messages||[]).map(m=>'<li>'+eh(m)+'</li>').join('');o.innerHTML='<div class="public-card-overlay-inner"><h1>Carton '+eh(card.numero)+'</h1><p class="'+(card.valid?'ok':'bad')+' public-card-status">'+(card.valid?'GAIN VALIDE':'NON VALIDE')+'</p><div class="public-card-grid">'+(card.lignes||[]).map((line,i)=>'<div class="public-card-line '+(card.lineResults?.[i]?.ok?'complete':'')+'">'+line.map(n=>'<span class="public-card-num">'+p2(n)+'</span>').join('')+'</div>').join('')+'</div>'+(msg?'<ul class="public-diagnostic-list">'+msg+'</ul>':'')+'</div>'}Loto.onChange(s=>{Loto.pageHeader();renderHomeCard(s.publicCard)});Loto.ensureSession();</script></body></html>
